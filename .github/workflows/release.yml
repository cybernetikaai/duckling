name: release

# Tag vX.Y.Z -> platform binaries attached to a GitHub Release. The primary
# consumer is the `ner` repo's build, which bundles these binaries into its
# platform wheels (duckling is an implementation detail of hybrid_ner, not a
# dependency its consumers manage).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # musl static: one binary per arch that runs on any linux (no
          # glibc floor) — the wheels that bundle these get honest
          # manylinux/musllinux-agnostic portability.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned; the toolchain is selected by input (the @ref shorthand
      # only works with mutable refs).
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: musl tools (linux static builds)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q musl-tools
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - name: Tag/version drift guard
        run: |
          V=$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          [ "v$V" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != Cargo.toml $V"; exit 1; }
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Smoke (batch-json round trip)
        run: |
          OUT=$(echo '{"text":"tomorrow at 5pm"}' | ./target/${{ matrix.target }}/release/duckling --dims all --batch-json)
          echo "$OUT" | grep -q '"dim"' || { echo "smoke failed: $OUT"; exit 1; }
      - name: Stage binary
        run: cp "target/${{ matrix.target }}/release/duckling" "duckling-${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: duckling-${{ matrix.target }}
          path: rust/duckling-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" duckling-* --generate-notes --repo "$GITHUB_REPOSITORY"
