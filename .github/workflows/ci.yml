name: CI

# Legacy Haskell CI. Scoped to Haskell sources so it does not gate Rust/docs
# PRs (the Rust port has its own gate, rust-ci.yml). Note: this only clears the
# retired-action hard-fail; the GHC 8.6.5–9.0.1 matrix may still need broader
# modernization to build on current runners.
on:
  pull_request:
    paths:
      - "Duckling/**"
      - "exe/**"
      - "tests/**"
      - "**/*.hs"
      - "duckling.cabal"
      - "stack.yaml"
      - "package.yaml"
  push:
    branches: [master]
    paths:
      - "Duckling/**"
      - "exe/**"
      - "tests/**"
      - "**/*.hs"
      - "duckling.cabal"
      - "stack.yaml"
      - "package.yaml"

jobs:
  stack:
    name: ${{ matrix.os }} / ghc ${{ matrix.ghc }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        stack: ["2.5.1"]
        ghc: ["8.6.5", "8.8.4", "8.10.3", "9.0.1"]

    steps:
    - uses: actions/checkout@v4
      if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.ref == 'refs/heads/master'

    - uses: haskell/actions/setup@v1
      name: Setup Haskell Stack
      with:
        ghc-version: ${{ matrix.ghc }}
        stack-version: ${{ matrix.stack }}

    - uses: actions/cache@v4
      name: Cache ~/.stack
      with:
        path: ~/.stack
        key: ${{ runner.os }}-${{ matrix.ghc }}-stack

    - name: Build
      run: |
        stack build duckling:lib --system-ghc --test --bench --no-run-tests --no-run-benchmarks

    - name: Test
      run: |
        stack test --system-ghc
